<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>준기의 인생영화</title>
    <style>
        /* 1. 기본 설정 및 테마 변수 */
        :root {
            --bg-color: #f4f4f0;
            --text-color: #222;
            --point-color: #e11d48;
            --border-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', 'Georgia', serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; }

        /* =========================================
           [실습 1] CSS Grid 메인 레이아웃 만들기
           ========================================= */
        .magazine-layout {
            max-width: 1200px;
            margin: 0 auto;
            border: 4px solid var(--border-color);
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            
            /* TODO 1: 여기를 Grid로 만들고, 가로를 3등분(1fr 2fr 1fr) 하세요. 간격은 20px! */
            
        }

        header {
            /* TODO 2: 헤더가 첫 칸부터 끝 칸까지 전체 너비를 차지하게 하세요. */
            grid-column: 1 / -1;
            text-align: center;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 20px; margin-bottom: 20px;
        }
        header h1 { font-size: 3rem; font-weight: 900; }
        
        aside { padding: 10px; }
        main { border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); padding: 0 20px; }

        /* =========================================
           [실습 2] 내부 기사 카드 Grid 배열
           ========================================= */
        .article-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            /* TODO 3: 메인 영역 내부 기사들도 Grid로 만드세요 (1fr 1fr 2단 구성, 간격 15px) */
            
        }

        /* 기사 카드 스타일 및 Transition (마우스 오버 효과) */
        .magic-card {
            border-bottom: 1px solid #ccc; padding-bottom: 15px; overflow: hidden;
            transition: transform 0.3s ease;
            /* TODO 4: 마우스를 올렸을 때 부드럽게 위로 살짝 떠오르도록 Transition과 transform을 추가해보세요. */
            
        }
        .magic-card:hover {
            transform: translateY(-10px);
        }    
        .magic-card img { width: 100%; height: 180px; object-fit: cover; }

        /* =========================================
           [실습 3] @keyframes 애니메이션 만들기
           ========================================= */
        .ticker-wrap { width: 100%; overflow: hidden; background: var(--border-color); color: #fff; padding: 10px 0; margin-bottom: 20px; }
        .ticker-move {
            display: inline-block; white-space: nowrap;
            animation: slide-left 10s linear infinite;
            /* TODO 5: 아래 만든 slide-left 애니메이션을 10초 동안 무한 반복(infinite) 선형(linear)으로 적용하세요. */
            
        }
        
        /* 텍스트가 흘러가는 애니메이션 */
        @keyframes slide-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* NEW 뱃지 깜빡임 애니메이션 */
        .badge-new {
            display: inline-block; background: var(--point-color); color: white; padding: 2px 8px; font-size: 0.8rem; border-radius: 12px; margin-bottom: 10px;
            animation: blink 1.5s infinite;
            /* TODO 6: 여기에 직접 새로운 @keyframes를 만들어 적용해보세요! (예: 둥둥 뜨기, 깜빡이기) */
            
        }

        /* 반응형 모바일 설정 */
        @media (max-width: 800px) {
            .magazine-layout { grid-template-columns: 1fr; }
            header { grid-column: 1; }
            main { border: none; padding: 0; margin: 20px 0; }
            .article-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
</head>
